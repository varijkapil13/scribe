name: CI

on:
  push:
    # Run on the default branch and on Claude working branches so every push is
    # compiled + tested on a real macOS 26 toolchain (the dev container has no
    # Swift toolchain and the app is Apple-framework-only, so CI is the only
    # place these actually build).
    branches: [master, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Logic-only unit tests via SwiftPM + line-coverage summary. These never boot
  # the audio/recording stack, so they run headless (see project.yml note).
  test:
    name: swift test + coverage
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Run tests with coverage
        # NOT --parallel: the suite shares the on-disk DatabaseManager.shared
        # (via *.shared stores), which races under multiple test processes
        # (one erases/migrates the DB file while another reads → "no such
        # table: grdb_migrations"). The project runs tests single-process.
        #
        # DISABLE_SWIFTLINT: CodeEditSourceEditor attaches the lukepistrol
        # SwiftLintPlugins *build-tool* plugin to its own targets, which runs
        # `swiftlint` while compiling them and fails on the runner. The plugin
        # reads this env var at plan time and emits no build commands when set
        # (Plugins/SwiftLint/main.swift → returns []), so swiftlint never runs.
        # We don't lint CodeEdit's vendored sources anyway. Must live in the
        # process env (not an xcodebuild build setting) so the plugin's
        # ProcessInfo sees it.
        env:
          DISABLE_SWIFTLINT: "YES"
        run: swift test --enable-code-coverage

      - name: Coverage summary
        # Best-effort: print total line coverage for the app sources (excluding
        # tests + SwiftPM build dir). Non-fatal so a path difference across
        # toolchains can't red the build. Tighten into a hard threshold once the
        # CI-measured baseline is known.
        run: |
          set -x
          PROF=$(find .build -name '*.profdata' | head -1)
          XCTEST=$(find .build -name '*.xctest' -type d | head -1)
          if [ -n "$PROF" ] && [ -n "$XCTEST" ]; then
            BIN="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
            xcrun llvm-cov report "$BIN" -instr-profile "$PROF" \
              -ignore-filename-regex='(ScribeTests|\.build)/' \
              | tee coverage.txt | tail -1
          else
            echo "coverage artifacts not found (prof=$PROF xctest=$XCTEST)"
          fi || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt
          if-no-files-found: ignore

  # Compile the shippable app target from the xcodegen-generated project.
  # Code signing is disabled so no certificates are needed in CI — this is the
  # authoritative "does it build?" gate.
  build:
    name: build app (unsigned)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        # DISABLE_SWIFTLINT: see the note on the `swift test` step. The
        # CodeEditSourceEditor SwiftLintPlugins build-tool plugin runs swiftlint
        # while compiling CodeEdit's targets and fails on the runner;
        # -skipPackagePluginValidation only skips the trust prompt, not
        # execution. The plugin emits no commands when this env var is present.
        env:
          DISABLE_SWIFTLINT: "YES"
        run: |
          xcodebuild \
            -project Scribe.xcodeproj \
            -scheme Scribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  # Compile the iOS/iPadOS app for the simulator (unsigned). The ScribeiOS
  # target is the notes+tasks client (no recording). Building here is the only
  # automated guard for the iOS port without physical devices. Starts from the
  # M0a stub and grows as portable sources are added to the target.
  build-ios:
    name: build iOS app (unsigned)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build iOS (simulator, unsigned)
        # DISABLE_SWIFTLINT: harmless here (the iOS target doesn't depend on
        # CodeEditSourceEditor) but kept for parity — if the dep ever resolves
        # for iOS, its build-tool plugin still won't run swiftlint on the runner.
        env:
          DISABLE_SWIFTLINT: "YES"
        run: |
          xcodebuild \
            -project Scribe.xcodeproj \
            -scheme ScribeiOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  # Compile the XCUITest target (app + UI tests) via build-for-testing. We do
  # NOT run the tests on CI yet: launching the XCUITest runner needs the app
  # ad-hoc signed + TCC automation permission, which isn't wired on the runner
  # (running `xcodebuild test` failed at launch on every run). build-for-testing
  # still guards that ScribeUITests.swift compiles against the app's a11y API.
  # Promote to full `xcodebuild test` once signing is configured.
  ui-test:
    name: compile UI tests (macOS)
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build for testing (compiles app + XCUITest target, unsigned)
        # DISABLE_SWIFTLINT: see the note on the `swift test` step — stops the
        # CodeEditSourceEditor build-tool plugin from running swiftlint (and
        # failing) while compiling CodeEdit's targets on the runner.
        env:
          DISABLE_SWIFTLINT: "YES"
        run: |
          xcodebuild build-for-testing \
            -project Scribe.xcodeproj \
            -scheme Scribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  # SPIKE: actually RUN the XCUITest screenshot harness and publish the PNGs.
  #
  # `ScreenshotTests` launches the app in fixture mode (--uitest-fixtures), seeds
  # a deterministic dataset (see UITestFixtures), walks every major surface, and
  # writes one PNG per screen to $SCRIBE_SCREENSHOT_DIR plus an XCTAttachment in
  # the .xcresult bundle. Both are uploaded as the `ui-screenshots` artifact.
  #
  # This may not produce images on a hosted runner: launching the XCUITest
  # runner for a macOS app needs the app signed (ad-hoc is usually enough) AND a
  # GUI login session, and the existing `compile UI tests` job exists precisely
  # because `xcodebuild test` historically failed at launch here. We ad-hoc sign
  # (CODE_SIGN_IDENTITY=-) to give it the best shot and keep the job
  # continue-on-error so it can NEVER block other jobs or a merge. Whether or not
  # the test launches, the .xcresult bundle is uploaded for diagnosis.
  ui-screenshots:
    name: ui-screenshots (spike)
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run screenshot UI tests
        env:
          SCRIBE_SCREENSHOT_DIR: ${{ runner.temp }}/screenshots
          # See the note on the `swift test` step — stops the
          # CodeEditSourceEditor build-tool plugin from running swiftlint (and
          # failing) while compiling CodeEdit's targets on the runner.
          DISABLE_SWIFTLINT: "YES"
        run: |
          set -o pipefail
          mkdir -p "$SCRIBE_SCREENSHOT_DIR"
          # Ad-hoc sign ("-") so the XCUITest runner can launch the app; no
          # certificates needed. -only-testing scopes the run to the screenshot
          # walk. -resultBundlePath keeps the attachments even if the run fails.
          xcodebuild test \
            -project Scribe.xcodeproj \
            -scheme Scribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation \
            -only-testing:ScribeUITests/ScreenshotTests \
            -resultBundlePath "$SCRIBE_SCREENSHOT_DIR/ScreenshotTests.xcresult" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            TEST_RUNNER_SCRIBE_SCREENSHOT_DIR="$SCRIBE_SCREENSHOT_DIR" \
            2>&1 | tee "$SCRIBE_SCREENSHOT_DIR/xcodebuild.log"

      # The macOS app/test process is sandboxed and can't reliably write PNGs to
      # the runner temp dir, but every screenshot IS captured as an XCTAttachment
      # inside the .xcresult. Export those attachments to real PNG files so they
      # can be downloaded and viewed directly.
      - name: Extract screenshots from xcresult
        if: always()
        run: |
          XCR="${{ runner.temp }}/screenshots/ScreenshotTests.xcresult"
          OUT="${{ runner.temp }}/screenshots/extracted"
          mkdir -p "$OUT"
          if [ -d "$XCR" ]; then
            xcrun xcresulttool export attachments \
              --path "$XCR" --output-path "$OUT" || true
          fi
          ls -la "$OUT" || true

      - name: List captured screenshots
        if: always()
        run: ls -la "${{ runner.temp }}/screenshots" "${{ runner.temp }}/screenshots/extracted" || true

      - name: Upload screenshots + result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: |
            ${{ runner.temp }}/screenshots/*.png
            ${{ runner.temp }}/screenshots/extracted/**
            ${{ runner.temp }}/screenshots/xcodebuild.log
            ${{ runner.temp }}/screenshots/ScreenshotTests.xcresult
          if-no-files-found: warn
