name: CI

on:
  push:
    branches: [master]
  pull_request:
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Logic-only unit tests via SwiftPM. These never boot the audio/recording
  # stack, so they run headless on a CI runner (see project.yml note).
  test:
    name: swift test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Run tests
        run: swift test --parallel

  # Compile the shippable app target from the xcodegen-generated project.
  # Code signing is disabled so no certificates are needed in CI — this only
  # verifies the app builds, not that it's distributable.
  build:
    name: build app (unsigned)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -switch /Applications/Xcode_26.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project Scribe.xcodeproj \
            -scheme Scribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
