<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: transparent;
    }
    .diagram { margin-bottom: 24px; }
    .diagram svg { max-width: 100%; height: auto; display: block; }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 24px 0; }
    .error {
      color: #c0392b;
      font-size: 12px;
      padding: 8px 12px;
      background: #fdf2f2;
      border-radius: 4px;
      border-left: 3px solid #e74c3c;
    }
    #content { min-height: 100vh; }
  </style>
  <script>
    // beautiful-mermaid.js is injected as a WKUserScript at document-start by the host
    // app — relying on <script src> against a file:// URL is unreliable for headless
    // WKWebViews. By the time this inline script runs, renderMermaidSVG is already
    // defined on the global object.
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const bg = isDark ? '#1e1e1e' : '#ffffff';
    const fg = isDark ? '#d4d4d4' : '#27272a';

    // The bundled mermaid script declares `var renderMermaid = renderMermaidSVGAsync;`
    // at top level, which (in a classic script) attaches to window and would overwrite
    // any wrapper we install on `window.renderMermaid`. Use a non-colliding name.
    //
    // We rasterize the produced SVG to PNG via canvas because Apple's NSImage SVG
    // parser doesn't support CSS custom properties (`var(--bg)`) or @import — features
    // that mermaid's stylesheet relies on. WebKit's own renderer handles them, so a
    // canvas drawImage + toDataURL gives us a fully-styled bitmap.
    window.__scribeRender = async function(source) {
      try {
        const fn = (typeof window.renderMermaidSVG === 'function')
            ? window.renderMermaidSVG
            : (typeof renderMermaidSVG === 'function' ? renderMermaidSVG : null);
        if (!fn) {
          const diag = {
            scriptStart: window._userScriptStart === true,
            scriptEnd: window._userScriptEnd === true,
            scriptError: window._userScriptError || null,
            wnFn: typeof window.renderMermaidSVG,
            bareFn: typeof renderMermaidSVG,
            mermaidKeys: Object.keys(window).filter(function(k){ return k.toLowerCase().indexOf('mermaid') !== -1; })
          };
          return { ok: false, error: 'renderMermaidSVG not loaded', diag: diag };
        }
        const svg = fn(source, { bg: bg, fg: fg, transparent: true });
        if (!svg) throw new Error('No SVG returned');

        // Encode the SVG to a data URL (UTF-8 safe).
        const utf8 = new TextEncoder().encode(svg);
        let binary = '';
        for (let i = 0; i < utf8.length; i++) binary += String.fromCharCode(utf8[i]);
        const dataUrl = 'data:image/svg+xml;base64,' + btoa(binary);

        // Load the SVG into an Image so the browser styles it (CSS vars, fonts).
        const img = new Image();
        await new Promise(function(resolve, reject) {
          img.onload = resolve;
          img.onerror = function() { reject(new Error('SVG image decode failed')); };
          img.src = dataUrl;
        });

        // Rasterize at 2x for crisp display on Retina.
        const scale = 2;
        const w = img.naturalWidth || img.width || 1;
        const h = img.naturalHeight || img.height || 1;
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(w * scale));
        canvas.height = Math.max(1, Math.round(h * scale));
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0);
        const png = canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, '');
        return { ok: true, png: png, w: w, h: h };
      } catch (e) {
        return { ok: false, error: String(e && e.message ? e.message : e) };
      }
    };

    window.setContent = function(html) {
      document.getElementById('content').innerHTML = html;
    };

    window._bmReady = true;
  </script>
</head>
<body>
  <div id="content">
    <p style="color: #999; font-size: 13px;">Rendering diagrams&#8230;</p>
  </div>
</body>
</html>
