name: Scribe

options:
  bundleIdPrefix: com.varij
  deploymentTarget:
    macOS: "26.0"

targets:
  Scribe:
    type: application
    platform: macOS
    sources:
      - path: Scribe/
    resources:
      - path: Scribe/Resources/
    dependencies:
      - package: GRDB.swift
        product: GRDB
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.varij.scribe
        INFOPLIST_FILE: Scribe/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scribe/Resources/Scribe.entitlements
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: Scribe
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ARCHS: arm64
        EXCLUDED_ARCHS[sdk=macosx*]: x86_64
        # Stable code signing so macOS TCC remembers granted permissions
        # (Microphone, Speech Recognition, Screen Recording) across rebuilds.
        DEVELOPMENT_TEAM: U8A3QH6Y84
        CODE_SIGN_STYLE: Automatic
    scheme:
      run:
        config: Debug
      test:
        config: Debug
      archive:
        config: Release

packages:
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift
    from: "6.24.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
