name: Scribe

options:
  bundleIdPrefix: com.varij
  deploymentTarget:
    macOS: "26.0"
    # iOS has no transcription (recording is macOS-only), so the iOS-26 /
    # SpeechAnalyzer floor does not apply. 18.0 maximizes device reach and
    # runs on the locally-installed 18.5 simulator. Shared code (@Observable,
    # Swift 6 concurrency, TextKit 2 editor) is all supported on 18.0.
    iOS: "18.0"

targets:
  Scribe:
    type: application
    platform: macOS
    sources:
      - path: Scribe/
    resources:
      - path: Scribe/Resources/
    dependencies:
      - package: GRDB.swift
        product: GRDB
      - package: KeyboardShortcuts
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.varij.scribe
        INFOPLIST_FILE: Scribe/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scribe/Resources/Scribe.entitlements
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: Scribe
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ARCHS: arm64
        EXCLUDED_ARCHS[sdk=macosx*]: x86_64
        # Stable code signing so macOS TCC remembers granted permissions
        # (Microphone, Speech Recognition, Screen Recording) across rebuilds.
        DEVELOPMENT_TEAM: U8A3QH6Y84
        CODE_SIGN_STYLE: Automatic
        # Hardened Runtime is required for notarization. Sandbox is intentionally
        # off (see Scribe.entitlements), but we still enable Hardened Runtime so
        # notarytool accepts the build.
        ENABLE_HARDENED_RUNTIME: "YES"
        # Disable JIT / executable memory pages by default; nothing in Scribe
        # needs them, and removing them shrinks the attack surface.
        OTHER_CODE_SIGN_FLAGS: "--options=runtime"
  # XCUITest target. Drives the built Scribe app through the accessibility
  # tree. The app is launched with `--uitesting` (see AppLaunchEnvironment) so
  # it boots without the audio / ScreenCaptureKit capture stack.
  ScribeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ScribeUITests/
    dependencies:
      - target: Scribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.varij.scribe.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ARCHS: arm64
        EXCLUDED_ARCHS[sdk=macosx*]: x86_64
        DEVELOPMENT_TEAM: U8A3QH6Y84
        CODE_SIGN_STYLE: Automatic
        TEST_TARGET_NAME: Scribe
  # iOS / iPadOS app target. The notes + tasks client (no recording — that's
  # macOS-only). Compiles the portable core directly (multiplatform target, not
  # a separate ScribeCore package — see docs/ICLOUD-MULTIPLATFORM-DESIGN.md):
  # Storage, Tasks, the meeting/entity data models, and shared logging. The two
  # FSEvents-bound vault files (NoteVaultWatcher, VaultCoordinator) are excluded
  # — they're macOS-only and nothing else in Storage references them in code.
  ScribeiOS:
    type: application
    platform: iOS
    sources:
      - path: ScribeiOS/
      - path: Scribe/Storage
        excludes:
          - NoteVaultWatcher.swift   # CoreServices / FSEvents — macOS only
          - VaultCoordinator.swift   # owns the watcher; imports SwiftUI chrome
      - path: Scribe/Tasks            # RecurrenceRule/Engine, QuickAddParser, reminders — all portable
      - path: Scribe/UI/Tasks/ActionItemConverter.swift   # pure logic: ActionItem→Task + NSDataDetector.scribeDateDetector (QuickAddParser needs it)
      - path: Scribe/Utilities/Log.swift
      - path: Scribe/Intelligence/MeetingModels.swift
      - path: Scribe/Intelligence/TranscriptAnalyzer.swift   # ExtractedEntity + NaturalLanguage (iOS-ok)
      - path: Scribe/App/AppLaunchEnvironment.swift
    dependencies:
      - package: GRDB.swift
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.varij.scribe
        PRODUCT_NAME: Scribe
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: U8A3QH6Y84
        CODE_SIGN_STYLE: Automatic

schemes:
  Scribe:
    build:
      targets:
        Scribe: all
        ScribeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ScribeUITests
    archive:
      config: Release
  ScribeiOS:
    build:
      targets:
        ScribeiOS: all
    run:
      config: Debug
    archive:
      config: Release

# NOTE: Logic-only unit tests live in `ScribeTests/` and are run via
# `swift test` against the SwiftPM package (see Package.swift). Hosting them
# inside Xcode's test scheme proved fragile because the host app boots
# audio/recording services during launch; SwiftPM's logic-only test bundle
# avoids the issue. The `ScribeUITests/` XCUITest target above launches the
# app out-of-process with `--uitesting`, which gates that boot — so it can
# live in the Xcode test scheme without the same crash.

packages:
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift
    from: "6.24.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.6.0"
