name: Scribe

options:
  bundleIdPrefix: com.varij
  deploymentTarget:
    macOS: "26.0"

targets:
  Scribe:
    type: application
    platform: macOS
    sources:
      - path: Scribe/
    resources:
      - path: Scribe/Resources/
    dependencies:
      - package: GRDB.swift
        product: GRDB
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.varij.scribe
        INFOPLIST_FILE: Scribe/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scribe/Resources/Scribe.entitlements
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: Scribe
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ARCHS: arm64
        EXCLUDED_ARCHS[sdk=macosx*]: x86_64
        # Stable code signing so macOS TCC remembers granted permissions
        # (Microphone, Speech Recognition, Screen Recording) across rebuilds.
        DEVELOPMENT_TEAM: U8A3QH6Y84
        CODE_SIGN_STYLE: Automatic
        # Hardened Runtime is required for notarization. Sandbox is intentionally
        # off (see Scribe.entitlements), but we still enable Hardened Runtime so
        # notarytool accepts the build.
        ENABLE_HARDENED_RUNTIME: "YES"
        # Disable JIT / executable memory pages by default; nothing in Scribe
        # needs them, and removing them shrinks the attack surface.
        OTHER_CODE_SIGN_FLAGS: "--options=runtime"
    scheme:
      run:
        config: Debug
      test:
        config: Debug
      archive:
        config: Release

# NOTE: Unit tests live in `ScribeTests/` and are run via `swift test` against
# the SwiftPM package (see Package.swift). Hosting them inside Xcode's test
# scheme proved fragile because the host app boots audio/recording services
# during launch; SwiftPM's logic-only test bundle avoids the issue.

packages:
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift
    from: "6.24.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
